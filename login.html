<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Stages MMI</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/tailwind.config.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-slate-100 flex flex-col justify-center items-center min-h-screen font-sans p-4">
    <div class="mb-8 text-center">
        <h2 class="text-3xl font-bold text-slate-800">Stages MMI Meaux</h2>
    </div>
    
    <div class="login-container bg-white rounded-xl shadow-2xl relative overflow-hidden w-[768px] max-w-full min-h-[480px]" id="login-container">
        
        <div class="form-container sign-up-container absolute top-0 h-full w-1/2 left-0 opacity-0 z-10 transition-all duration-500">
            <form action="index.html" class="flex flex-col items-center justify-center h-full px-12 text-center bg-white">
                <h1 class="font-bold text-2xl mb-4 text-slate-800">Créer un compte</h1>
                <input type="text" placeholder="Nom complet" class="w-full bg-slate-100 px-4 py-3 my-2 rounded-md focus:ring-2 focus:ring-brandEnd outline-none">
                <input type="email" placeholder="Email @etudiant.univ.fr" class="w-full bg-slate-100 px-4 py-3 my-2 rounded-md focus:ring-2 focus:ring-brandEnd outline-none">
                <input type="password" placeholder="Mot de passe" class="w-full bg-slate-100 px-4 py-3 my-2 rounded-md focus:ring-2 focus:ring-brandEnd outline-none">
                <button type="button" class="mt-4 rounded-full bg-gradient-to-r from-brandStart to-brandEnd text-white font-bold py-3 px-10 uppercase tracking-wider hover:scale-105 transition-transform shadow-md">S'inscrire</button>
            </form>
        </div>

        <div class="form-container sign-in-container absolute top-0 h-full w-1/2 left-0 z-20 transition-all duration-500">
            <form action="index.html" class="flex flex-col items-center justify-center h-full px-12 text-center bg-white">
                <h1 class="font-bold text-2xl mb-4 text-slate-800">Se connecter</h1>
                <input type="email" placeholder="Email" class="w-full bg-slate-100 px-4 py-3 my-2 rounded-md focus:ring-2 focus:ring-brandEnd outline-none">
                <input type="password" placeholder="Mot de passe" class="w-full bg-slate-100 px-4 py-3 my-2 rounded-md focus:ring-2 focus:ring-brandEnd outline-none">
                <a href="index.html" class="mt-4 rounded-full bg-gradient-to-r from-brandStart to-brandEnd text-white font-bold py-3 px-10 uppercase tracking-wider hover:scale-105 transition-transform text-center shadow-md">Connexion</a>
            </form>
        </div>

        <div class="overlay-container absolute top-0 left-1/2 w-1/2 h-full overflow-hidden z-[100] transition-transform duration-500">
            <div class="overlay bg-gradient-to-r from-brandStart to-brandEnd text-white relative -left-full h-full w-[200%] transition-transform duration-500 shadow-inner">
                <div class="overlay-panel overlay-left absolute flex flex-col items-center justify-center px-10 text-center top-0 h-full w-1/2 transition-transform duration-500">
                    <h1 class="font-bold text-2xl mb-4">Déjà inscrit ?</h1>
                    <button class="border border-white rounded-full py-2 px-8 uppercase font-bold text-xs hover:bg-white hover:text-brandStart transition-all" id="signIn">Se connecter</button>
                </div>
                <div class="overlay-panel overlay-right absolute right-0 flex flex-col items-center justify-center px-10 text-center top-0 h-full w-1/2 transition-transform duration-500">
                    <h1 class="font-bold text-2xl mb-4">Pas encore de compte ?</h1>
                    <button class="border border-white rounded-full py-2 px-8 uppercase font-bold text-xs hover:bg-white hover:text-brandStart transition-all" id="signUp">S'inscrire</button>
                </div>
            </div>
        </div>
    </div>
    <script src="assets/js/script.js"></script>
</body>
</html>
