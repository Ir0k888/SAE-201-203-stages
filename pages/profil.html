<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../assets/js/tailwind.config.js"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <nav class="fixed top-0 w-full flex justify-between items-center py-4 px-8 bg-white/90 backdrop-blur-md z-50 border-b border-slate-100 transition-shadow duration-300">
        <div class="font-bold text-xl text-transparent bg-clip-text bg-gradient-to-r from-brandStart to-brandEnd">MMI Stages</div>
        
        <div class="burger hidden flex-col justify-center gap-1.5 w-7 h-5 cursor-pointer z-[1100] md:hidden" id="burger">
            <span class="block h-0.5 w-full bg-slate-800 rounded transition-transform duration-300"></span>
            <span class="block h-0.5 w-full bg-slate-800 rounded transition-opacity duration-300"></span>
            <span class="block h-0.5 w-full bg-slate-800 rounded transition-transform duration-300"></span>
        </div>

        <ul id="nav-links" class="hidden md:flex gap-8 items-center absolute md:static top-full left-0 w-full md:w-auto bg-white md:bg-transparent flex-col md:flex-row py-6 md:py-0 shadow-lg md:shadow-none">
            <li><a href="../index.html" class="nav-link font-medium text-slate-600 hover:text-brandStart transition-colors">Accueil</a></li>
            <li><a href="offres.html" class="nav-link font-medium text-slate-600 hover:text-brandStart transition-colors">Offres</a></li>
            <li><a href="suivi-recherches.html" class="nav-link font-medium text-slate-600 hover:text-brandStart transition-colors">Recherches</a></li>
            <li><a href="soutenances.html" class="nav-link font-medium text-slate-600 hover:text-brandStart transition-colors">Soutenance</a></li>
            <li><a href="profil.html" class="nav-link active font-medium text-slate-700 hover:text-brandStart transition-colors">Profil</a></li>
            <li><a href="../login.html" class="md:ml-4 bg-red-500 text-white px-5 py-2 rounded-full text-sm font-bold hover:bg-red-600 transition-colors">Déconnexion</a></li>
        </ul>
    </nav>

    <main class="pt-32 pb-16 px-6 max-w-4xl mx-auto min-h-screen">
        <section class="reveal opacity-0 translate-y-7 transition-all duration-700 ease-out mb-8">
            <h2 class="text-3xl font-bold text-slate-800">Mon Profil</h2>
            <p class="text-slate-500 mt-2">Mettez à jour vos informations personnelles.</p>
        </section>
        
        <section class="reveal opacity-0 translate-y-7 transition-all duration-700 delay-100 ease-out bg-white p-8 rounded-xl shadow-sm border border-slate-100">
            <form action="#" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Numéro étudiant</label>
                    <input type="text" value="20245678" readonly class="w-full bg-slate-100 text-slate-500 border-none px-4 py-3 rounded-md cursor-not-allowed">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Adresse E-mail</label>
                    <input type="email" value="jean.dupont@etudiant.univ.fr" readonly class="w-full bg-slate-100 text-slate-500 border-none px-4 py-3 rounded-md cursor-not-allowed">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Nom</label>
                    <input type="text" value="Dupont" class="w-full bg-slate-50 border border-slate-200 px-4 py-3 rounded-md focus:ring-2 focus:ring-brandEnd outline-none transition-shadow">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Prénom</label>
                    <input type="text" value="Jean" class="w-full bg-slate-50 border border-slate-200 px-4 py-3 rounded-md focus:ring-2 focus:ring-brandEnd outline-none transition-shadow">
                </div>
                
                <div class="md:col-span-2 mt-4">
                    <button type="submit" class="w-full rounded-full bg-gradient-to-r from-brandStart to-brandEnd text-white font-bold py-3 px-6 uppercase tracking-wider hover:scale-[1.02] transition-transform">
                        Enregistrer
                    </button>
                </div>
            </form>
        </section>
    </main>

    <script src="../assets/js/script.js"></script>
</body>
</html>
